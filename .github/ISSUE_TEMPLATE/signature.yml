name: Signature Request
description: Request to be added as a signatory of the Sustainable Software Engineering with Agentic AI Manifesto
title: "Signature Request – "
labels: ["signature-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for endorsing the **Sustainable Software Engineering with Agentic AI Manifesto**.

        Complete this short form and submit. Your signature is appended to `SIGNATORIES.md` **automatically** within a minute, and this issue closes itself — no waiting.

  - type: input
    id: full_name
    attributes:
      label: Full Name
      description: Your full legal name (no pseudonyms).
      placeholder: e.g., Jane Doe
    validations:
      required: true

  - type: input
    id: role
    attributes:
      label: Role / Title
      description: Your professional role or title.
      placeholder: e.g., Software Architect, Associate Professor
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Organization, university, company, or independent.
      placeholder: e.g., University of Sevilla / Independent Engineer
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country
      description: Country of professional affiliation.
      placeholder: e.g., Spain
    validations:
      required: true

  - type: dropdown
    id: signing_type
    attributes:
      label: Signing As
      description: Select how you are signing.
      options:
        - Individual
        - Organization (authorized representative)
    validations:
      required: true

  - type: input
    id: organization_name
    attributes:
      label: Organization name (only if signing as an organization)
      description: Leave blank if you are signing as an individual. The "Affiliation" field is used otherwise.
      placeholder: e.g., University of Sevilla
    validations:
      required: false

  - type: checkboxes
    id: commitments
    attributes:
      label: Declaration
      description: By checking the box below, you affirm your endorsement.
      options:
        - label: I have read the manifesto and support its principles. I understand that signing is a professional and ethical commitment, not a legal contract.
          required: true

  - type: markdown
    attributes:
      value: |
        After you submit, a bot automatically appends your signature to `SIGNATORIES.md` in chronological order and closes this issue. If anything looks off, just reopen or comment.
