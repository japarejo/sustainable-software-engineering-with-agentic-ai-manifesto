name: Update Signatories Badges

on:
  push:
    paths:
      - "SIGNATORIES.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Dynamically grab the correct branch for push / workflow_dispatch / pull_request.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Recount signatories and write badge JSON
        run: python3 .github/scripts/update_badges.py

      - name: Commit badge updates
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            signatories-individuals.json
            signatories-organizations.json
            signatories-total.json
          message: "chore: update signatories badges"
